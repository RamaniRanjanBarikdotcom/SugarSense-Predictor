<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SugarSense Predictor â€” Prediction & Health Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: #f0fafa; overflow: hidden; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #b2d8d8; border-radius: 99px; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes chatPop { from { opacity:0; transform:scale(0.85) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }
  @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const Icon = ({ name, size=20, color='currentColor', style={} }) => {
  const icons = {
    heart:        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
    activity:     <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
    droplet:      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>,
    user:         <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
    bot:          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>,
    send:         <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
    close:        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    history:      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>,
    refresh:      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,
  };
  return icons[name] || null;
};

const FIELDS = [
  { key:'pregnancies',   label:'Pregnancies',           unit:'count',  min:0,    max:20,  hint:'Number of times pregnant',           normal:'0â€“5',       step:1     },
  { key:'glucose',       label:'Glucose Level',         unit:'mg/dL',  min:1,    max:300, hint:'Plasma glucose concentration',        normal:'70â€“99',     step:1     },
  { key:'bloodPressure', label:'Blood Pressure',        unit:'mm Hg',  min:20,   max:200, hint:'Diastolic blood pressure',            normal:'60â€“80',     step:1     },
  { key:'skinThickness', label:'Skin Thickness',        unit:'mm',     min:0,    max:100, hint:'Triceps skin fold thickness',         normal:'10â€“40',     step:1     },
  { key:'insulin',       label:'Insulin Level',         unit:'Î¼U/mL',  min:0,    max:900, hint:'2-Hour serum insulin',               normal:'16â€“166',    step:1     },
  { key:'bmi',           label:'BMI',                   unit:'kg/mÂ²',  min:10,   max:70,  hint:'Body mass index',                    normal:'18.5â€“24.9', step:0.1   },
  { key:'dpf',           label:'Diabetes Pedigree Fn.', unit:'',       min:0.05, max:3,   hint:'Genetic likelihood â€“ family history', normal:'0.08â€“0.8',  step:0.001 },
  { key:'age',           label:'Age',                   unit:'years',  min:1,    max:120, hint:'Age in years',                        normal:'Any',       step:1     },
];


const PRI='#0f766e', ACC='#14b8a6';
const CARD='#ffffff', BG='#f0fafa', TP='#0f172a', TS='#64748b', BD='#e2e8f0', IB='#f8fafc';

function visualRisk(v) {
  let s=0;
  if(v.glucose>140) s+=30; else if(v.glucose>110) s+=15;
  if(v.bmi>30) s+=20; else if(v.bmi>25) s+=8;
  if(v.age>50) s+=12; else if(v.age>40) s+=6;
  if(v.dpf>0.5) s+=10;
  if(v.bloodPressure>90) s+=8;
  if(v.insulin>200) s+=8;
  if(v.skinThickness>35) s+=4;
  if(v.pregnancies>5) s+=8;
  return Math.min(98,Math.max(2,s));
}

function RiskGauge({pct,color,label}) {
  const r=45,cx=60,cy=60,circ=2*Math.PI*r,arc=circ*0.75,offset=arc-(arc*pct/100);
  return (
    <svg width="120" height="90" viewBox="0 0 120 90" style={{overflow:'visible'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#e2e8f0" strokeWidth="10" strokeDasharray={`${arc} ${circ}`} strokeLinecap="round" transform="rotate(135 60 60)"/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="10" strokeDasharray={`${arc} ${circ}`} strokeDashoffset={offset} strokeLinecap="round" transform="rotate(135 60 60)" style={{transition:'stroke-dashoffset 1.2s cubic-bezier(0.34,1.56,0.64,1)',filter:`drop-shadow(0 0 6px ${color}60)`}}/>
      <text x={cx} y={cy+4} textAnchor="middle" fontSize="18" fontWeight="700" fill="#0f172a" fontFamily="DM Sans">{pct}%</text>
      <text x={cx} y={cy+18} textAnchor="middle" fontSize="9" fill="#64748b" fontFamily="DM Sans">{label}</text>
    </svg>
  );
}

function TypingDots() {
  return (
    <div style={{display:'flex',gap:4,alignItems:'center',padding:'6px 2px'}}>
      {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:'50%',background:'#94a3b8',animation:'pulse 1.2s ease-in-out infinite',animationDelay:`${i*0.2}s`}}/>)}
    </div>
  );
}

function FieldInput({field,value,onChange}) {
  const [focused,setFocused]=useState(false);
  return (
    <div style={{animation:'fadeUp 0.4s ease both'}}>
      <label style={{display:'block',fontSize:11.5,fontWeight:600,color:TS,marginBottom:6,textTransform:'uppercase',letterSpacing:'0.6px'}}>{field.label}</label>
      <div style={{position:'relative'}}>
        <input type="number" value={value} min={field.min} max={field.max} step={field.step||1}
          onChange={e=>onChange(e.target.value)} onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}
          placeholder={field.hint}
          style={{width:'100%',padding:'11px 44px 11px 14px',borderRadius:10,border:`1.5px solid ${focused?PRI:BD}`,background:IB,color:TP,fontFamily:'DM Sans',fontSize:13,outline:'none',transition:'border-color 0.2s',boxShadow:focused?`0 0 0 3px ${PRI}20`:'none'}}/>
        {field.unit&&<span style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',fontSize:10,color:TS,pointerEvents:'none',fontWeight:500}}>{field.unit}</span>}
      </div>
      <div style={{fontSize:10,color:TS,marginTop:3}}>Normal: {field.normal}</div>
    </div>
  );
}

function ResultPanel({result,onChat,values}) {
  const factors=[
    {label:'Glucose',       val:values.glucose,       unit:'mg/dL', risk:values.glucose>140},
    {label:'BMI',           val:values.bmi,           unit:'',      risk:values.bmi>30},
    {label:'Blood Pressure',val:values.bloodPressure, unit:'mmHg',  risk:values.bloodPressure>90},
    {label:'Insulin',       val:values.insulin,       unit:'Î¼U/mL', risk:values.insulin>200},
  ];
  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{background:CARD,borderRadius:20,padding:24,boxShadow:'0 2px 20px rgba(0,0,0,0.06)',border:`1px solid ${BD}`,textAlign:'center'}}>
        <div style={{fontSize:11,color:TS,textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:12}}>ML Model Result</div>
        <RiskGauge pct={result.pct} color={result.color} label={result.label.split('â€”')[0].trim()}/>
        <div style={{marginTop:10,display:'inline-flex',alignItems:'center',gap:6,padding:'6px 14px',borderRadius:99,background:`${result.color}18`,border:`1px solid ${result.color}40`}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:result.color}}/>
          <span style={{fontSize:12,fontWeight:600,color:result.color}}>{result.label}</span>
        </div>
        <p style={{marginTop:14,fontSize:12,color:TS,lineHeight:1.6}}>{result.advice}</p>
      </div>
      <div style={{background:CARD,borderRadius:20,padding:20,boxShadow:'0 2px 20px rgba(0,0,0,0.06)',border:`1px solid ${BD}`}}>
        <div style={{fontSize:11,color:TS,textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:12}}>Key Factors</div>
        {factors.map(f=>(
          <div key={f.label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${BD}`}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:f.risk?'#dc2626':'#16a34a'}}/>
              <span style={{fontSize:12,color:TS}}>{f.label}</span>
            </div>
            <span style={{fontSize:12,fontWeight:600,color:f.risk?'#dc2626':'#16a34a'}}>{f.val} {f.unit}</span>
          </div>
        ))}
      </div>
      <button onClick={onChat} style={{padding:13,borderRadius:14,border:`1.5px solid ${PRI}`,background:`${PRI}10`,color:PRI,fontFamily:'DM Sans',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
        <Icon name="bot" size={15} color={PRI}/>Ask Health Assistant
      </button>
    </div>
  );
}

function HistoryTab({history}) {
  if(!history.length) return (
    <div style={{textAlign:'center',padding:'80px 0',color:TS}}>
      <Icon name="history" size={40} color={TS}/>
      <p style={{marginTop:16,fontSize:14}}>No assessments yet. Run a prediction to see history.</p>
    </div>
  );
  return (
    <div style={{display:'grid',gap:16}}>
      {history.map((h,i)=>(
        <div key={i} style={{background:CARD,borderRadius:16,padding:'20px 24px',border:`1px solid ${BD}`,display:'flex',alignItems:'center',gap:20,animation:'fadeUp 0.4s ease'}}>
          <div style={{textAlign:'center',minWidth:70}}>
            <div style={{fontSize:22,fontWeight:700,color:h.color}}>{h.pct}%</div>
            <div style={{fontSize:10,color:TS}}>{(h.label||'').split('â€”')[0].trim()}</div>
          </div>
          <div style={{flex:1,display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
            {[['Glucose',h.glucose,'mg/dL'],['BMI',h.bmi,''],['Age',h.age,'yr'],['BP',h.bloodPressure,'mmHg']].map(([l,v,u])=>(
              <div key={l}>
                <div style={{fontSize:10,color:TS}}>{l}</div>
                <div style={{fontSize:13,fontWeight:600,color:TP}}>{v}{u}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:11,color:TS}}>{h.date}</div>
        </div>
      ))}
    </div>
  );
}

function ChatPanel({messages,chatInput,setChatInput,sendChat,chatLoading,chatEndRef,onClose,quickPrompts,onQuick}) {
  const renderText=text=>text.split('\n').map((line,i)=>{
    const bold=line.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    return <p key={i} style={{margin:'2px 0'}} dangerouslySetInnerHTML={{__html:bold}}/>;
  });
  return (
    <div style={{position:'fixed',bottom:24,right:28,width:390,height:580,background:CARD,borderRadius:24,boxShadow:'0 20px 60px rgba(0,0,0,0.2)',display:'flex',flexDirection:'column',zIndex:100,animation:'chatPop 0.3s cubic-bezier(0.34,1.56,0.64,1)',border:`1px solid ${BD}`,overflow:'hidden'}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${PRI},${ACC})`,padding:'14px 18px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:34,height:34,borderRadius:'50%',background:'rgba(255,255,255,0.2)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Icon name="bot" size={17} color="white"/>
            </div>
            <div>
              <div style={{color:'white',fontWeight:600,fontSize:13}}>Health Assistant</div>
              <div style={{color:'rgba(255,255,255,0.7)',fontSize:10,display:'flex',alignItems:'center',gap:4}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:'#4ade80'}}/>Online
              </div>
            </div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="close" size={14} color="white"/>
          </button>
        </div>
      </div>
      <div ref={chatEndRef} style={{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:12}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start',animation:'msgIn 0.3s ease'}}>
            {m.role==='assistant'&&<div style={{width:28,height:28,borderRadius:'50%',background:`${PRI}20`,display:'flex',alignItems:'center',justifyContent:'center',marginRight:8,flexShrink:0,alignSelf:'flex-end'}}><Icon name="bot" size={14} color={PRI}/></div>}
            <div style={{maxWidth:'78%',padding:'10px 14px',borderRadius:m.role==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px',background:m.role==='user'?`linear-gradient(135deg,${PRI},${ACC})`:`${PRI}10`,color:m.role==='user'?'white':TP,fontSize:12.5,lineHeight:1.6}}>
              {renderText(m.text)}
            </div>
          </div>
        ))}
        {chatLoading&&(
          <div style={{display:'flex',alignItems:'flex-end',gap:8}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:`${PRI}20`,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="bot" size={14} color={PRI}/></div>
            <div style={{padding:'10px 14px',borderRadius:'18px 18px 18px 4px',background:`${PRI}10`}}><TypingDots/></div>
          </div>
        )}
      </div>
      {messages.length<3&&(
        <div style={{padding:'0 12px 8px',display:'flex',gap:6,flexWrap:'wrap'}}>
          {quickPrompts.map(q=>(
            <button key={q} onClick={()=>{onQuick(q);setTimeout(sendChat,50);}}
              style={{padding:'5px 10px',borderRadius:99,border:`1px solid ${BD}`,background:'transparent',color:TS,cursor:'pointer',fontSize:10.5,fontFamily:'DM Sans',whiteSpace:'nowrap'}}>{q}</button>
          ))}
        </div>
      )}
      <div style={{padding:'12px 16px',borderTop:`1px solid ${BD}`,display:'flex',gap:8,alignItems:'flex-end'}}>
        <input value={chatInput} onChange={e=>setChatInput(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendChat()}
          placeholder="Ask anything about diabetes or your results…" maxLength={2000}
          style={{flex:1,padding:'10px 14px',borderRadius:12,border:`1.5px solid ${BD}`,background:IB,color:TP,fontFamily:'DM Sans',fontSize:12.5,outline:'none'}}/>
        <button onClick={sendChat} disabled={!chatInput.trim()||chatLoading}
          style={{width:40,height:40,borderRadius:12,border:'none',background:chatInput.trim()?`linear-gradient(135deg,${PRI},${ACC})`:'#e2e8f0',cursor:chatInput.trim()?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <Icon name="send" size={15} color={chatInput.trim()?'white':'#94a3b8'}/>
        </button>
      </div>
    </div>
  );
}

function App() {
  const emptyVals={pregnancies:'',glucose:'',bloodPressure:'',skinThickness:'',insulin:'',bmi:'',dpf:'',age:''};
  const [values,setValues]=useState(emptyVals);
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [chatOpen,setChatOpen]=useState(false);
  const [messages,setMessages]=useState([{role:'assistant',text:"Hi! I'm your **SugarSense Predictor Health Assistant**\n\nI can help you understand diabetes risk factors, explain the form fields, or answer general health questions.\n\nWhat would you like to know?"}]);
  const [chatInput,setChatInput]=useState('');
  const [chatLoading,setChatLoading]=useState(false);
  const [activeTab,setActiveTab]=useState('predict');
  const [history,setHistory]=useState([]);
  const chatEndRef=useRef(null);

  useEffect(()=>{if(chatEndRef.current) chatEndRef.current.scrollTop=chatEndRef.current.scrollHeight;},[messages,chatLoading]);
  useEffect(()=>{const s=localStorage.getItem('ds_history');if(s){try{setHistory(JSON.parse(s));}catch(e){}}}, []);

  const handlePredict=async()=>{
    const incomplete=FIELDS.some(f=>values[f.key]==='');
    if(incomplete){setError('Please fill in all fields before predicting.');return;}
    setError(null);setLoading(true);
    const numVals=Object.fromEntries(Object.entries(values).map(([k,v])=>[k,parseFloat(v)]));
    try{
      const res=await fetch('/predict_api',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(numVals)});
      const data=await res.json();
      if(!res.ok){setError(data.error||'Prediction failed.');setLoading(false);return;}
      const gaugeScore=visualRisk(numVals);
      const r=data.prediction===1
        ?{pct:Math.max(gaugeScore,60),color:'#dc2626',label:'Diabetic â€” High Risk',advice:'The model predicts diabetes. Please consult a healthcare professional as soon as possible.'}
        :{pct:Math.min(gaugeScore,38),color:'#16a34a',label:'Non-Diabetic â€” Low Risk',advice:'The model predicts no diabetes. Maintain your healthy lifestyle with regular exercise and a balanced diet.'};
      setResult(r);
      const entry={...numVals,...r,date:new Date().toLocaleDateString()};
      const newHist=[entry,...history].slice(0,5);
      setHistory(newHist);localStorage.setItem('ds_history',JSON.stringify(newHist));
    }catch(e){setError('Could not connect to the prediction server. Make sure Flask is running.');}
    setLoading(false);
  };

  const handleReset=()=>{setValues(emptyVals);setResult(null);setError(null);};

  const sendChat=async()=>{
    if(!chatInput.trim()||chatLoading)return;
    const msg=chatInput.trim();setChatInput('');
    const updatedMessages=[...messages,{role:'user',text:msg}];
    setMessages(updatedMessages);setChatLoading(true);
    try{
      const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({history:updatedMessages})});
      const data=await res.json();
      setMessages(m=>[...m,{role:'assistant',text:data.reply||'Sorry, no reply.'}]);
    }catch(e){setMessages(m=>[...m,{role:'assistant',text:'Sorry, I had trouble connecting. Please try again.'}]);}
    setChatLoading(false);
  };

  const quickPrompts=['What is diabetes?','How to lower blood sugar?','What does BMI mean?','Best foods to avoid?','What are the symptoms?'];

  return (
    <div style={{display:'flex',height:'100vh',background:BG,fontFamily:'DM Sans,sans-serif',fontSize:14,position:'relative',overflow:'hidden'}}>
      {/* Sidebar */}
      <aside style={{width:240,background:PRI,display:'flex',flexDirection:'column',flexShrink:0,boxShadow:'4px 0 20px rgba(0,0,0,0.15)'}}>
        <div style={{padding:'28px 24px 20px',borderBottom:'1px solid rgba(255,255,255,0.12)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:'rgba(255,255,255,0.2)',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="droplet" size={18} color="white"/></div>
            <div>
              <div style={{color:'white',fontWeight:700,fontSize:15,letterSpacing:'-0.3px'}}>SugarSense Predictor</div>
              <div style={{color:'rgba(255,255,255,0.6)',fontSize:10}}>AI Prediction System</div>
            </div>
          </div>
        </div>
        <nav style={{padding:'16px 12px',flex:1}}>
          {[{id:'predict',label:'Prediction',icon:'activity'},{id:'history',label:'History',icon:'history'}].map(item=>(
            <button key={item.id} onClick={()=>setActiveTab(item.id)}
              style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:10,border:'none',cursor:'pointer',background:activeTab===item.id?'rgba(255,255,255,0.2)':'transparent',color:'white',fontFamily:'DM Sans',fontSize:13,fontWeight:activeTab===item.id?600:400,marginBottom:4,transition:'background 0.2s'}}>
              <Icon name={item.icon} size={16} color="white"/>{item.label}
            </button>
          ))}
        </nav>
        <div style={{margin:'0 12px 20px',padding:14,borderRadius:12,background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.15)'}}>
          <div style={{color:'rgba(255,255,255,0.7)',fontSize:10,marginBottom:4,textTransform:'uppercase',letterSpacing:'0.8px'}}>Daily Tip</div>
          <div style={{color:'white',fontSize:11.5,lineHeight:1.5}}>Regular physical activity can reduce type 2 diabetes risk by up to 58%.</div>
        </div>
        <button onClick={()=>setChatOpen(true)}
          style={{margin:'0 12px 24px',display:'flex',alignItems:'center',gap:8,padding:'10px 14px',borderRadius:10,border:'1px solid rgba(255,255,255,0.3)',cursor:'pointer',background:'rgba(255,255,255,0.12)',color:'white',fontFamily:'DM Sans',fontSize:13,fontWeight:500}}>
          <Icon name="bot" size={16} color="white"/>Health Assistant
        </button>
      </aside>

      {/* Main */}
      <main style={{flex:1,overflow:'auto',padding:'32px 40px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:32,animation:'fadeUp 0.5s ease'}}>
          <div>
            <h1 style={{fontFamily:'DM Serif Display',fontSize:28,color:TP,letterSpacing:'-0.5px',marginBottom:4}}>
              {activeTab==='predict'?'SugarSense Risk Assessment':'Prediction History'}
            </h1>
            <p style={{color:TS,fontSize:13}}>
              {activeTab==='predict'?'Enter your health metrics to get an instant ML-powered risk prediction':'Your recent assessment results'}
            </p>
          </div>
          {activeTab==='predict'&&result&&(
            <button onClick={handleReset} style={{display:'flex',alignItems:'center',gap:6,padding:'9px 16px',borderRadius:10,border:`1px solid ${BD}`,background:CARD,color:TS,cursor:'pointer',fontFamily:'DM Sans',fontSize:12}}>
              <Icon name="refresh" size={13}/>New Assessment
            </button>
          )}
        </div>

        {activeTab==='history'
          ?<HistoryTab history={history}/>
          :(
          <div style={{display:'grid',gridTemplateColumns:result?'1fr 340px':'1fr',gap:24,alignItems:'start'}}>
            <div style={{background:CARD,borderRadius:20,padding:28,boxShadow:'0 2px 20px rgba(0,0,0,0.06)',border:`1px solid ${BD}`,animation:'fadeUp 0.5s ease'}}>
              {error&&<div style={{marginBottom:16,padding:'10px 14px',borderRadius:10,background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',fontSize:12.5}}>{error}</div>}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'20px 24px'}}>
                {FIELDS.map(f=><FieldInput key={f.key} field={f} value={values[f.key]} onChange={v=>setValues(prev=>({...prev,[f.key]:v}))}/>)}
              </div>
              <button onClick={handlePredict} disabled={loading}
                style={{marginTop:28,width:'100%',padding:15,borderRadius:14,border:'none',background:loading?'#94a3b8':`linear-gradient(135deg,${PRI},${ACC})`,color:'white',fontFamily:'DM Sans',fontSize:15,fontWeight:600,cursor:loading?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:loading?'none':`0 6px 20px ${PRI}50`,transition:'all 0.3s'}}>
                {loading
                  ?<><div style={{width:18,height:18,border:'2px solid rgba(255,255,255,0.3)',borderTopColor:'white',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>Analyzingâ€¦</>
                  :<><Icon name="activity" size={17} color="white"/>Run SugarSense Prediction</>}
              </button>
            </div>
            {result&&<div style={{animation:'slideIn 0.5s ease'}}><ResultPanel result={result} onChat={()=>setChatOpen(true)} values={values}/></div>}
          </div>
        )}
      </main>

      {/* Floating chat button */}
      {!chatOpen&&(
        <button onClick={()=>setChatOpen(true)}
          style={{position:'fixed',bottom:28,right:28,width:58,height:58,borderRadius:'50%',background:`linear-gradient(135deg,${PRI},${ACC})`,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 8px 24px ${PRI}60`,zIndex:50,transition:'transform 0.2s'}}
          onMouseEnter={e=>e.currentTarget.style.transform='scale(1.1)'}
          onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>
          <Icon name="bot" size={24} color="white"/>
          <div style={{position:'absolute',top:0,right:0,width:14,height:14,borderRadius:'50%',background:'#22c55e',border:'2px solid white'}}/>
        </button>
      )}

      {/* Chat */}
      {chatOpen&&<ChatPanel messages={messages} chatInput={chatInput} setChatInput={setChatInput} sendChat={sendChat} chatLoading={chatLoading} chatEndRef={chatEndRef} onClose={()=>setChatOpen(false)} quickPrompts={quickPrompts} onQuick={q=>setChatInput(q)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
